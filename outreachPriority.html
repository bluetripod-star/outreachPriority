<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영업 대상 관리</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Pretendard', 'Noto Sans KR', -apple-system, sans-serif; background: #F4F5F7; height: 100vh; overflow: hidden; }

  /* ── 헤더 ── */
  #header { background: #1A1A1A; height: 52px; padding: 0 22px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  #header .logo { font-weight: 900; font-size: 17px; color: #E8470A; letter-spacing: 0.07em; }
  #header .subtitle { color: #aaa; font-size: 12px; margin-left: 10px; }
  #header .sep { color: #444; margin: 0 6px; }

  /* ── 통계바 ── */
  #statsbar { background: #fff; border-bottom: 1px solid #E5E7EB; padding: 7px 22px; display: flex; gap: 24px; overflow-x: auto; flex-shrink: 0; }
  .stat-item { display: flex; gap: 5px; align-items: baseline; white-space: nowrap; }
  .stat-label { font-size: 9.5px; color: #9CA3AF; font-weight: 700; }
  .stat-value { font-size: 12.5px; color: #E8470A; font-weight: 700; }
  .stat-value.purple { color: #7C3AED; }

  /* ── 레이아웃 ── */
  #main { display: flex; flex: 1; height: 100%; overflow: hidden; }

  /* ── 왼쪽 패널 ── */
  #left { width: 295px; border-right: 1px solid #E5E7EB; background: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
  #btn-row { padding: 10px 13px; border-bottom: 1px solid #F3F4F6; display: flex; gap: 6px; }
  .btn-outline { flex: 1; padding: 8px; background: #fff; border: 1.5px solid #E8470A; border-radius: 8px; cursor: pointer; color: #E8470A; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
  .btn-solid { flex: 1; padding: 8px; background: linear-gradient(135deg, #E8470A, #F97316); border: none; border-radius: 8px; cursor: pointer; color: #fff; font-weight: 700; font-size: 12px; display: flex; align-items: center; justify-content: center; gap: 5px; }
  #search-box { padding: 10px 13px; border-bottom: 1px solid #F3F4F6; }
  #search-box input { width: 100%; padding: 8px 10px; border: 1.5px solid #E5E7EB; border-radius: 7px; font-size: 12.5px; outline: none; }
  #search-box input:focus { border-color: #E8470A; }
  .filter-row { display: flex; gap: 5px; margin-top: 7px; }
  .filter-row select { flex: 1; padding: 5px 6px; border: 1.5px solid #E5E7EB; border-radius: 6px; font-size: 11.5px; background: #F9FAFB; color: #374151; outline: none; }
  #sort-row { display: flex; gap: 4px; padding: 6px 13px 8px; border-bottom: 1px solid #F3F4F6; flex-wrap: wrap; }
  .sort-btn { font-size: 10.5px; padding: 3px 8px; border-radius: 12px; border: 1px solid #E5E7EB; background: #fff; color: #6B7280; cursor: pointer; display: flex; align-items: center; gap: 3px; transition: all .12s; white-space: nowrap; }
  .sort-btn:hover { border-color: #E8470A; color: #E8470A; }
  .sort-btn.active { background: #1A1A1A; color: #fff; border-color: #1A1A1A; font-weight: 700; }
  .sort-btn .arrow { font-size: 9px; opacity: 0.7; }
  /* ── 별점 우선순위 ── */
  .stars { display:flex; gap:1px; flex-shrink:0; }
  .star  { font-size:9px; line-height:1; }
  .star.on  { color:#F59E0B; }
  .star.off { color:#E5E7EB; }

  #contact-list { flex: 1; overflow-y: auto; }
  .contact-item { padding: 9px 13px; border-bottom: 1px solid #F9FAFB; cursor: pointer; border-left: 3px solid transparent; transition: background .1s; }
  .contact-item:hover { background: #FFF9F7; }
  .contact-item.active { background: #FFF4EE; border-left-color: #E8470A; }
  .contact-item.is-new { background: #FAFFF4; border-left-color: #22C55E; }
  .contact-item.active.is-new { background: #FFF4EE; border-left-color: #E8470A; }
  .ci-top { display: flex; justify-content: space-between; gap: 4px; align-items: flex-start; }
  .ci-name { font-weight: 600; font-size: 12px; color: #111827; }
  .ci-company { font-size: 11px; color: #6B7280; margin-top: 2px; }
  .ci-title { font-size: 10px; color: #9CA3AF; margin-top: 1px; }
  .new-badge { font-size: 9px; background: #DCFCE7; color: #15803D; border-radius: 3px; padding: 1px 4px; margin-right: 4px; }
  .type-badge { font-size: 9px; border-radius: 3px; padding: 1px 4px; white-space: nowrap; flex-shrink: 0; border: 1px solid; }

  /* ── 오른쪽 패널 ── */
  #right { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .empty-state { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #9CA3AF; }
  .empty-state .icon { font-size: 40px; margin-bottom: 10px; }
  .empty-state h3 { font-size: 14px; font-weight: 700; color: #374151; }
  .empty-state p { font-size: 12px; margin-top: 5px; }
  .lang-pills { display: flex; gap: 8px; margin-top: 20px; }
  .lang-pill { background: #fff; border: 1px solid #E5E7EB; border-radius: 7px; padding: 8px 14px; font-size: 12px; color: #6B7280; }

  /* 연락처 카드 */
  .contact-card { background: #fff; border: 1px solid #E5E7EB; border-radius: 9px; padding: 14px 16px; margin-bottom: 12px; }
  .cc-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .cc-name { font-weight: 700; font-size: 15px; color: #111827; }
  .cc-company { color: #4B5563; font-size: 12px; margin-top: 2px; }
  .cc-title { color: #9CA3AF; font-size: 11px; margin-top: 1px; }
  .cc-meta { display: flex; gap: 10px; margin-top: 9px; flex-wrap: wrap; align-items: center; }
  .cc-email, .cc-phone { font-size: 11px; color: #6B7280; }
  .cc-note { font-size: 10.5px; color: #D97706; background: #FFFBEB; padding: 2px 6px; border-radius: 3px; border: 1px solid #FDE68A; }
  .copy-mini { font-size: 9.5px; padding: 1px 5px; background: #F3F4F6; border: 1px solid #D1D5DB; border-radius: 3px; cursor: pointer; color: #374151; margin-left: 4px; }

  /* 컨트롤 */
  .section-label { font-size: 10.5px; font-weight: 700; color: #6B7280; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.05em; }
  .controls-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; align-items: flex-start; }
  .purpose-btns { flex: 1; min-width: 200px; }
  .purpose-btns .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .pill-btn { padding: 5px 11px; border-radius: 5px; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; font-size: 12px; cursor: pointer; transition: all .12s; }
  .season-picker .btn-group { display: flex; gap: 5px; }
  .season-picker .pill-btn { font-size: 11.5px; line-height: 1.4; text-align: center; }
  .lang-row { margin-bottom: 12px; }
  .lang-row .btn-group { display: flex; gap: 5px; flex-wrap: wrap; }
  .lang-btn { padding: 5px 12px; border-radius: 5px; font-size: 12px; cursor: pointer; border: 1.5px solid #E5E7EB; background: #fff; color: #6B7280; transition: all .12s; }
  .lang-btn.active { border-color: #4338CA; background: #EEF2FF; color: #4338CA; font-weight: 700; }
  .note-row { margin-bottom: 12px; }
  .note-row input { width: 100%; padding: 8px 11px; border: 1.5px solid #E5E7EB; border-radius: 7px; font-size: 12.5px; outline: none; color: #1F2937; }
  .note-row input:focus { border-color: #E8470A; }

  /* 이메일 출력 */
  .email-box { background: #fff; border: 1.5px solid #E5E7EB; border-radius: 9px; overflow: hidden; }
  .email-header { background: #F9FAFB; border-bottom: 1px solid #E5E7EB; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; }
  .email-header span { font-weight: 700; font-size: 12.5px; color: #111827; }
  .copy-all-btn { padding: 5px 14px; background: #E8470A; color: #fff; border: none; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 700; transition: background .15s; }
  .copy-all-btn.done { background: #10B981; }
  .email-body { padding: 13px 15px; }
  .subject-row { display: flex; align-items: center; gap: 7px; margin-bottom: 11px; }
  .row-label { font-size: 10px; font-weight: 700; color: #9CA3AF; width: 30px; flex-shrink: 0; }
  .subject-box { flex: 1; background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 5px; padding: 6px 9px; font-size: 12.5px; font-weight: 600; color: #111827; display: flex; justify-content: space-between; align-items: center; gap: 7px; }
  .body-row { display: flex; gap: 7px; }
  .body-row .row-label { padding-top: 4px; }
  .body-pre { background: #F9FAFB; border: 1px solid #E5E7EB; border-radius: 7px; padding: 11px 13px; font-size: 12px; line-height: 1.8; white-space: pre-wrap; font-family: inherit; color: #1F2937; margin: 0; width: 100%; }
  .copy-body-btn { margin-top: 7px; padding: 5px 12px; background: #F3F4F6; border: 1px solid #D1D5DB; border-radius: 5px; font-size: 11.5px; cursor: pointer; color: #374151; }
  .no-purpose { background: #FFF4EE; border: 1.5px dashed #E8470A; border-radius: 9px; padding: 18px; text-align: center; color: #9A3412; font-size: 13px; }

  /* ── 모달 공통 ── */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.55); z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 16px; }
  .modal-box { background: #fff; border-radius: 14px; width: 100%; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
  .modal-header { padding: 16px 20px; border-bottom: 1px solid #E5E7EB; display: flex; justify-content: space-between; align-items: center; flex-shrink: 0; }
  .modal-header h2 { font-weight: 700; font-size: 15px; color: #111827; }
  .modal-header p { font-size: 11.5px; color: #9CA3AF; margin-top: 2px; }
  .modal-close { background: none; border: none; font-size: 20px; cursor: pointer; color: #9CA3AF; line-height: 1; }
  .modal-body { flex: 1; overflow-y: auto; padding: 16px 20px; }
  .modal-footer { padding: 12px 20px; border-top: 1px solid #E5E7EB; display: flex; gap: 8px; justify-content: flex-end; align-items: center; background: #FAFAFA; flex-shrink: 0; }

  /* ── 수동 등록 모달 ── */
  #add-modal .modal-box { max-width: 560px; max-height: 90vh; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
  .form-field label { font-size: 10.5px; font-weight: 700; color: #6B7280; display: block; margin-bottom: 3px; }
  .form-field input, .form-field select { width: 100%; padding: 7px 9px; border: 1.5px solid #E5E7EB; border-radius: 6px; font-size: 12.5px; outline: none; color: #111827; background: #fff; }
  .form-field input:focus, .form-field select:focus { border-color: #E8470A; }
  .analyze-btn { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer; font-weight: 700; font-size: 13px; margin-bottom: 14px; transition: background .15s; }
  .analyze-btn.ready { background: #1A1A1A; color: #fff; }
  .analyze-btn.disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }

  /* 분류 결과 */
  .result-box { border: 1.5px solid; border-radius: 10px; overflow: hidden; }
  .result-grade { padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
  .result-grade-label { font-weight: 700; font-size: 14px; }
  .result-grade-desc { font-size: 11.5px; margin-top: 2px; opacity: 0.8; }
  .result-score { text-align: right; }
  .result-score .num { font-size: 26px; font-weight: 900; line-height: 1; }
  .result-score .denom { font-size: 10px; opacity: 0.7; }
  .result-detail { padding: 12px 16px; background: #fff; }
  .result-reasons { margin-bottom: 12px; }
  .reason-tag { font-size: 11px; background: #F3F4F6; color: #374151; padding: 3px 8px; border-radius: 10px; display: inline-block; margin: 2px; }
  .result-role { border-radius: 8px; padding: 10px 12px; border: 1px solid; display: flex; align-items: center; justify-content: space-between; }
  .role-label { font-size: 10.5px; font-weight: 700; color: #6B7280; margin-bottom: 3px; }
  .role-name { font-weight: 700; font-size: 14px; }
  .role-reason { font-size: 11px; margin-top: 2px; opacity: 0.8; }
  .role-alts { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; }
  .role-alt-btn { font-size: 10.5px; padding: 3px 8px; background: #fff; border-radius: 4px; cursor: pointer; border: 1px solid; }

  .btn-cancel { padding: 7px 16px; background: #F3F4F6; border: 1px solid #D1D5DB; border-radius: 7px; cursor: pointer; font-size: 13px; color: #374151; }
  .btn-add { padding: 7px 18px; background: #E8470A; color: #fff; border: none; border-radius: 7px; cursor: pointer; font-size: 13px; font-weight: 700; }
  .btn-add.disabled { background: #E5E7EB; color: #9CA3AF; cursor: not-allowed; }

  /* ── 탭 ── */
  #tab-bar { display: flex; border-bottom: 1px solid #E5E7EB; background: #fff; flex-shrink: 0; }
  .tab-btn { padding: 10px 18px; font-size: 13px; font-weight: 600; color: #9CA3AF; border: none; background: none; cursor: pointer; border-bottom: 2px solid transparent; transition: all .15s; white-space: nowrap; }
  .tab-btn.active { color: #E8470A; border-bottom-color: #E8470A; }
  #tab-email { display: flex; height: calc(100vh - 112px); }
  /* ── 랭킹 탭 ── */
  #tab-ranking { display: none; height: calc(100vh - 112px); background: #F4F5F7; }
  .rk-wrap { display: flex; height: 100%; }

  /* 사이드바 */
  .rk-sidebar { width: 270px; flex-shrink:0; background:#1A1A1A; overflow-y:auto; padding:18px 16px; display:flex; flex-direction:column; gap:14px; }
  .rk-sidebar-title { font-size:10px; font-weight:800; letter-spacing:.12em; text-transform:uppercase; color:#E8470A; }
  .rk-sidebar-sub { font-size:10px; color:#6B7280; line-height:1.5; }
  .crit-block { background:#242424; border-radius:8px; padding:11px 13px; }
  .crit-block-title { font-size:9.5px; font-weight:700; color:#9CA3AF; text-transform:uppercase; letter-spacing:.07em; margin-bottom:8px; display:flex; justify-content:space-between; }
  .crit-block-title span { color:#E8470A; font-weight:800; }
  .crit-line { display:flex; align-items:center; gap:7px; padding:3.5px 0; border-bottom:1px solid #2e2e2e; }
  .crit-line:last-child { border-bottom:none; }
  .crit-label { font-size:10px; color:#D1D5DB; flex:0 0 140px; }
  .crit-bar-bg { flex:1; height:3px; background:#333; border-radius:2px; overflow:hidden; }
  .crit-bar-fill { height:100%; background:#E8470A; border-radius:2px; }
  .crit-pts { font-size:10.5px; font-weight:700; color:#E8470A; min-width:28px; text-align:right; }
  .crit-pts.green { color:#34D399; }
  .crit-pts.muted { color:#4B5563; }
  .type-rule { display:flex; align-items:center; gap:7px; padding:4px 0; border-bottom:1px solid #2e2e2e; }
  .type-rule:last-child { border-bottom:none; }
  .type-rule-badge { font-size:9.5px; padding:2px 6px; border-radius:4px; font-weight:700; white-space:nowrap; }
  .type-rule-desc { font-size:10px; color:#9CA3AF; }

  /* 메인 */
  .rk-main { flex:1; overflow-y:auto; padding:18px 20px; }
  .rk-top { margin-bottom:14px; }
  .rk-title { font-size:16px; font-weight:800; color:#111827; }
  .rk-title span { color:#E8470A; }
  .rk-desc { font-size:11px; color:#9CA3AF; margin-top:2px; }

  /* 요약 카드 */
  .grade-summary { display:grid; grid-template-columns:repeat(3,1fr); gap:8px; margin-bottom:14px; }
  .gs-card { border-radius:9px; padding:12px 14px; border:1.5px solid; cursor:pointer; transition:transform .12s, box-shadow .12s; }
  .gs-card:hover { transform:translateY(-2px); box-shadow:0 4px 14px rgba(0,0,0,.1); }
  .gs-count { font-size:26px; font-weight:900; line-height:1; }
  .gs-label { font-size:11px; font-weight:700; margin-top:3px; }
  .gs-pts { font-size:10px; margin-top:2px; opacity:.75; }

  /* 분포 바 */
  .dist-bar-wrap { background:#fff; border:1px solid #E5E7EB; border-radius:9px; padding:12px 16px; margin-bottom:16px; }
  .dist-bar-label { font-size:10px; font-weight:700; color:#6B7280; margin-bottom:7px; text-transform:uppercase; letter-spacing:.04em; }
  .dist-bar-track { display:flex; height:26px; border-radius:5px; overflow:hidden; }
  .dist-seg { display:flex; align-items:center; justify-content:center; font-size:10px; font-weight:700; color:#fff; cursor:pointer; transition:opacity .15s; }
  .dist-seg:hover { opacity:.82; }
  .dist-legend { display:flex; gap:12px; margin-top:7px; flex-wrap:wrap; }
  .dist-legend-item { font-size:10.5px; color:#6B7280; display:flex; align-items:center; gap:4px; }
  .dist-dot { width:7px; height:7px; border-radius:50%; display:inline-block; }

  /* 카드 리스트 */
  .rk-section-label { font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.07em; margin:14px 0 7px; display:flex; align-items:center; gap:5px; }
  .rk-card { background:#fff; border:1px solid #E5E7EB; border-radius:9px; padding:10px 13px; margin-bottom:5px; display:grid; grid-template-columns:26px 1fr 80px 88px auto; align-items:center; gap:10px; cursor:pointer; transition:background .1s, box-shadow .1s; }
  .rk-card:hover { background:#FFF9F7; box-shadow:0 2px 8px rgba(232,71,10,.08); }
  .rk-rank { font-size:12px; font-weight:900; color:#D1D5DB; text-align:center; }
  .rk-rank.gold   { color:#F59E0B; }
  .rk-rank.silver { color:#9CA3AF; }
  .rk-rank.bronze { color:#B45309; }
  .rk-name { font-size:12px; font-weight:700; color:#111827; }
  .rk-company { font-size:10px; color:#9CA3AF; margin-top:1px; }
  .rk-score-col { display:flex; flex-direction:column; gap:3px; }
  .rk-score-num { font-size:17px; font-weight:900; line-height:1; }
  .rk-score-bar-bg { width:100%; height:3px; background:#F3F4F6; border-radius:2px; overflow:hidden; }
  .rk-score-bar-fill { height:100%; border-radius:2px; }
  .rk-type-badge { font-size:9.5px; padding:3px 7px; border-radius:4px; font-weight:700; border:1px solid; white-space:nowrap; display:inline-block; text-align:center; }
  .rk-tags { display:flex; flex-wrap:wrap; gap:3px; justify-content:flex-end; }
  .rk-tag { font-size:9px; background:#F3F4F6; color:#6B7280; padding:2px 5px; border-radius:5px; }


  /* ── 3단 헤더 ── */
  #app-title-bar { background:#111; height:46px; padding:0 20px; display:flex; align-items:center; gap:10px; flex-shrink:0; border-bottom:1px solid #222; }
  .app-title { font-size:16px; font-weight:900; color:#fff; letter-spacing:-.02em; }
  .app-title-sep { color:#444; }
  .app-subtitle { font-size:11px; color:#666; flex:1; }
  .db-badge { font-size:10px; background:#222; color:#888; border:1px solid #333; border-radius:10px; padding:2px 8px; }

  #event-chip-bar { background:#1A1A1A; padding:8px 20px; display:flex; align-items:center; gap:8px; flex-shrink:0; border-bottom:1px solid #2a2a2a; min-height:40px; }
  .event-chip { padding:5px 14px; border-radius:20px; border:1.5px solid #444; background:#2a2a2a; color:#aaa; font-size:12px; font-weight:600; cursor:pointer; transition:all .15s; white-space:nowrap; }
  .event-chip:hover { border-color:#888; color:#ddd; }
  .event-chip.active { background:#E8470A; border-color:#E8470A; color:#fff; box-shadow:0 0 0 2px rgba(232,71,10,.25); }
  .chip-placeholder { padding:5px 14px; border-radius:20px; border:1.5px dashed #333; color:#444; font-size:11px; cursor:default; white-space:nowrap; }

  #event-detail-bar { background:#fff; border-bottom:2px solid #F3F4F6; padding:7px 20px; display:flex; align-items:center; gap:0; flex-shrink:0; min-height:42px; overflow-x:auto; }
  .ev-season-pill { padding:4px 12px; border-radius:14px; border:1.5px solid #E5E7EB; background:#fff; color:#6B7280; font-size:11px; font-weight:600; cursor:pointer; margin-right:6px; white-space:nowrap; line-height:1.35; transition:all .12s; }
  .ev-season-pill.active { background:#FFF4EE; border-color:#E8470A; color:#E8470A; font-weight:700; }
  .ev-season-date { font-size:9.5px; opacity:.7; font-weight:400; }
  .ev-divider { width:1px; background:#E5E7EB; height:22px; margin:0 14px; flex-shrink:0; }
  .ev-perf-label { font-size:9px; color:#E8470A; font-weight:800; margin-right:8px; white-space:nowrap; }
  .ev-stat-item { display:flex; flex-direction:column; gap:1px; margin-right:16px; white-space:nowrap; }
  .ev-stat-label { font-size:9px; color:#9CA3AF; font-weight:700; }
  .ev-stat-value { font-size:12px; color:#111; font-weight:700; }
</style>
</head>
<body>

<!-- ── Tier 1: 제목부 ── -->

};
let sortKey = 'priority'; // 'name' | 'country' | 'priority' | 'type'
let sortDir = 1; // 1 = asc, -1 = desc

const SORT_OPTIONS = [
  { key: 'priority', label: '섭외 우선순위', asc: '높은순', desc: '낮은순' },
  { key: 'name',     label: '이름',         asc: 'A→Z',   desc: 'Z→A'   },
  { key: 'country',  label: '국가',         asc: 'A→Z',   desc: 'Z→A'   },
  { key: 'type',     label: '유형',         asc: '부스→미디어', desc: '미디어→부스' },
];

function setSort(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderSortRow();
  renderList();
}

function renderSortRow() {
  document.getElementById('sort-row').innerHTML = SORT_OPTIONS.map(o => {
    const active = sortKey === o.key;
    const arrow = active ? (sortDir === 1 ? '↑' : '↓') : '';
    return `<button class="sort-btn${active?' active':''}" onclick="setSort('${o.key}')">
      ${o.label}${active?` <span class="arrow">${arrow}</span>`:''}
    </button>`;
  }).join('');
}

function classifyContact(f) {
  let score = f.score ?? 0; const reasons = [];
  const t = (f.title||"").toLowerCase(), ind = (f.industry||"").toLowerCase(), co = (f.company||"").toLowerCase();
  if (/대표|ceo|사장|회장|president|founder|owner|representative/.test(t)) { score+=30; reasons.push("의사결정권자"); }
  else if (/이사|director|manager|본부장|부장|팀장|head|officer/.test(t)) { score+=20; reasons.push("중간관리자"); }
  else if (/담당|coordinator|executive|specialist/.test(t)) { score+=12; reasons.push("실무 담당자"); }
  else { score+=8; }
  if (/반려동물|펫|pet/.test(ind)) { score+=40; reasons.push("핵심 타겟 업종"); }
  else if (/유통|무역|distribution|trade|import|export|wholesale/.test(ind)) { score+=30; reasons.push("유통/무역 업종"); }
  else if (/제약|의료|헬스|health|pharma|수의/.test(ind)) { score+=25; reasons.push("헬스케어 관련"); }
  else if (/화장품|코스메틱|cosmet/.test(ind)) { score+=22; reasons.push("뷰티/코스메틱"); }
  else if (/it|기술|tech|통신/.test(ind)) { score+=18; reasons.push("IT/기술 업종"); }
  else if (/미디어|언론|media|광고|방송/.test(ind)) { score+=18; reasons.push("미디어 업종"); }
  else if (/식품|food|건강|영양/.test(ind)) { score+=18; reasons.push("식품 관련"); }
  else if (/전시|이벤트|expo|fair/.test(ind)) { score+=15; reasons.push("전시/이벤트"); }
  else { score+=3; reasons.push("관련도 낮은 업종"); }
  if (f.email) { score+=15; reasons.push("이메일 보유"); }
  if (f.phone) { score+=10; reasons.push("연락처 보유"); }
  const grade = score>=70?"high":score>=40?"mid":"low";
  let suggestedType="부스", typeReason="제조/브랜드 업체로 부스 참가 적합";
  const isBigCo = /lg|삼성|현대|롯데|sk|cj|카카오|네이버|쿠팡|아모레|애경|lotte|hyundai|samsung|purina|mars|royal canin/.test(co);
  if (/미디어|언론|media|방송/.test(ind)||/기자|reporter|journalist|editor|pd/.test(t)) { suggestedType="미디어"; typeReason="미디어/언론 종사자로 파트너십 적합"; }
  else if (/유통|무역|trade|distribution|import|export|wholesale/.test(ind)||/buyer|purchasing|sourcing|구매/.test(t)) { suggestedType="바이어"; typeReason="유통/구매 담당으로 바이어 초청 적합"; }
  else if (isBigCo||(score>=75&&/it|tech|통신|제약|화장품/.test(ind))) { suggestedType="스폰서"; typeReason="대기업 또는 높은 브랜드 파워로 스폰서 적합"; }
  return { score:Math.min(score,100), grade, reasons, suggestedType, typeReason };
}

function esc(s){ return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function typeBadgeHtml(type) {
  const tc = TYPE_COLORS[type]||TYPE_COLORS["부스"];
  return `<span class="type-badge" style="background:${tc.bg};color:${tc.text};border-color:${tc.border}">${tc.label}</span>`;
}
function copyText(text, btnId) {
  navigator.clipboard.writeText(text).then(()=>{
    const btn = document.getElementById(btnId);
    if (!btn) return;
    const orig = btn.textContent;
    btn.textContent = "✓ 복사됨"; btn.classList.add("done");
    setTimeout(()=>{ btn.textContent=orig; btn.classList.remove("done"); }, 2000);
  });
}

// ── 연락처 목록 렌더 ──────────────────────────────────────────────────────
function renderList() {
  const q = document.getElementById("search-input").value.toLowerCase();
  const ft = document.getElementById("filter-type").value;
  const fc = document.getElementById("filter-country").value;
  let filtered = contacts.filter(c =>
    (!q || c.name.toLowerCase().includes(q) || c.company.toLowerCase().includes(q) || (c.industry||"").toLowerCase().includes(q)) &&
    (ft==="전체" || c.type===ft) &&
    (fc==="전체" || c.country===fc)
  );

  // 정렬
  const TYPE_ORDER = {"부스":0,"바이어":1,"스폰서":2,"미디어":3};
  filtered.sort((a, b) => {
    let va, vb;
    if (sortKey === 'priority') {
      va = a.score ?? classifyContact(a).score;
      vb = b.score ?? classifyContact(b).score;
      return (vb - va) * sortDir; // 높은 점수가 위
    } else if (sortKey === 'name') {
      va = a.name.replace(/\(.*\)/,'').trim();
      vb = b.name.replace(/\(.*\)/,'').trim();
      return va.localeCompare(vb, 'ko') * sortDir;
    } else if (sortKey === 'country') {
      va = a.country; vb = b.country;
      return va.localeCompare(vb, 'ko') * sortDir;
    } else if (sortKey === 'type') {
      va = TYPE_ORDER[a.type] ?? 9;
      vb = TYPE_ORDER[b.type] ?? 9;
      return (va - vb) * sortDir;
    }
    return 0;
  });
  const shown = filtered.length, total = contacts.length;
  document.getElementById("count-label").innerHTML =
    `<span style="font-weight:600;color:#6B7280">${shown}</span>명 표시&ensp;/&ensp;전체 <span style="font-weight:600;color:#6B7280">${total}</span>명`;
  document.getElementById("contact-count") && (document.getElementById("contact-count").textContent = total + "명");

  // 별점: score → 1~5성 (70↑=5, 60↑=4, 45↑=3, 30↑=2, else=1)
  function scoreToStars(score) {
    return score>=70?5 : score>=60?4 : score>=45?3 : score>=30?2 : 1;
  }
  function starsHtml(n) {
    return `<span class="stars">${[1,2,3,4,5].map(i=>`<span class="star ${i<=n?'on':'off'}">${i<=n?'★':'★'}</span>`).join('')}</span>`;
  }

  document.getElementById("contact-list").innerHTML = filtered.map(c => {
    const active = state.selected && state.selected.id===c.id;
    const badge = typeBadgeHtml(c.type);
    const score = c.score ?? classifyContact(c).score;
    const stars = scoreToStars(score);
    const sh = starsHtml(stars);
    return `<div class="contact-item${active?" active":""}${c._new?" is-new":""}" onclick="selectContact(${c.id})">
      <div class="ci-top">
        <div class="ci-name">${c._new?'<span class="new-badge">NEW</span>':''}${esc(FLAGS[c.country]||"🌏")} ${esc(c.name||c.company)}</div>
        <div style="display:flex;align-items:center;gap:4px;flex-shrink:0">${sh}${badge}</div>
      </div>
      <div class="ci-company">${esc(c.company)}</div>
      ${c.title?`<div class="ci-title">${esc(c.title)}</div>`:""}
    </div>`;
  }).join("");
}

function selectContact(id) {
  const c = contacts.find(x=>x.id===id);
  if (!c) return;
  state.selected = c;
  state.purpose = c.type;
  state.langOverride = "auto";
  state.customNote = "";
  document.getElementById("empty-state").style.display = "none";
  document.getElementById("detail-panel").style.display = "block";
  renderList();
  renderDetail();
}

function setPurpose(p) { state.purpose = p; renderDetail(); }
function setLang(v) { state.langOverride = v; renderDetail(); }

function openAddModal() {
  document.getElementById("add-modal").style.display = "flex";
  document.getElementById("f-name").value = "";
  document.getElementById("f-company").value = "";
  document.getElementById("f-title").value = "";
  document.getElementById("f-email").value = "";
  document.getElementById("f-phone").value = "";
  document.getElementById("f-note").value = "";
  document.getElementById("f-country").value = "한국";
  document.getElementById("f-industry").value = "반려동물/펫케어";
  document.getElementById("f-lang").value = "한국어";
  document.getElementById("classify-result").style.display = "none";
  document.getElementById("add-confirm-btn").className = "btn-add disabled";
  document.getElementById("add-confirm-btn").textContent = "등록";
  updateAnalyzeBtn();

function closeAddModal() { document.getElementById("add-modal").style.display = "none"; }

function updateAnalyzeBtn() {
  const ok = document.getElementById("f-name").value.trim() && document.getElementById("f-company").value.trim();
  const btn = document.getElementById("analyze-btn");
  btn.className = "analyze-btn " + (ok?"ready":"disabled");
}
function updateAddBtn() {
  const ok = document.getElementById("f-name").value.trim() && document.getElementById("f-company").value.trim();
  const btn = document.getElementById("add-confirm-btn");
  if (ok) { btn.className="btn-add"; } else { btn.className="btn-add disabled"; }
}

let _classifyResult = null;
let _classifyType = null;

function runClassify() {
  const name = document.getElementById("f-name").value.trim();
  const company = document.getElementById("f-company").value.trim();
  if (!name || !company) return;
  const form = {
    name, company,
    title: document.getElementById("f-title").value.trim(),
    email: document.getElementById("f-email").value.trim(),
    phone: document.getElementById("f-phone").value.trim(),
    industry: document.getElementById("f-industry").value,
  };
  const r = classifyContact(form);
  _classifyResult = r;
  _classifyType = r.suggestedType;
  renderClassifyResult(r);
  updateAddBtn();
}

function setClassifyType(t) {
  _classifyType = t;
  renderClassifyResult(_classifyResult);
}

function renderClassifyResult(r) {
  const GRADE = {
    high:{color:"#059669",bg:"#ECFDF5",border:"#6EE7B7",label:"✅ 높은 적합도",desc:"적극 섭외 대상"},
    mid: {color:"#D97706",bg:"#FFFBEB",border:"#FCD34D",label:"⚡ 보통 적합도",desc:"상황에 따라 섭외"},
    low: {color:"#DC2626",bg:"#FEF2F2",border:"#FCA5A5",label:"❌ 낮은 적합도",desc:"우선순위 낮음"},
  };
  const gs = GRADE[r.grade];
  const tc = TYPE_COLORS[_classifyType]||TYPE_COLORS["부스"];
  const reasons = r.reasons.map(x=>`<span class="reason-tag">${esc(x)}</span>`).join("");
  const altBtns = ["부스","바이어","스폰서","미디어"].filter(t=>t!==_classifyType).map(t=>{
    const at = TYPE_COLORS[t];
    return `<button class="role-alt-btn" onclick="setClassifyType('${t}')" style="border-color:${at.border};color:${at.text}">${t}로 변경</button>`;
  }).join("");

  document.getElementById("classify-result").style.display = "block";
  document.getElementById("classify-result").innerHTML = `
    <div class="result-box" style="border-color:${gs.border}">
      <div class="result-grade" style="background:${gs.bg}">
        <div>
          <div class="result-grade-label" style="color:${gs.color}">${gs.label}</div>
          <div class="result-grade-desc" style="color:${gs.color}">${gs.desc}</div>
        </div>
        <div class="result-score" style="color:${gs.color}">
          <div class="num">${r.score}</div>
          <div class="denom">/ 100점</div>
        </div>
      </div>
      <div class="result-detail">
        <div class="result-reasons">
          <div class="section-label" style="margin-bottom:6px">점수 산정 이유</div>
          ${reasons}
        </div>
        <div class="result-role" style="background:${tc.bg};border-color:${tc.border}">
          <div>
            <div class="role-label">추천 섭외 유형</div>
            <div class="role-name" style="color:${tc.text}">${tc.label}</div>
            <div class="role-reason" style="color:${tc.text}">${r.typeReason}</div>
          </div>
          <div class="role-alts">${altBtns}</div>
        </div>
      </div>
    </div>`;
  document.getElementById("add-confirm-btn").textContent = `✓ ${_classifyType}로 등록`;
  document.getElementById("add-confirm-btn").className = "btn-add";
}

function confirmAdd() {
  const name = document.getElementById("f-name").value.trim();
  const company = document.getElementById("f-company").value.trim();
  if (!name || !company) return;
  const nextId = Math.max(...contacts.map(c=>c.id), 0) + 1;
  const newContact = {
    id: nextId,
    name,
    company,
    title: document.getElementById("f-title").value.trim(),
    email: document.getElementById("f-email").value.trim(),
    phone: document.getElementById("f-phone").value.trim(),
    country: document.getElementById("f-country").value,
    industry: document.getElementById("f-industry").value,
    lang: document.getElementById("f-lang").value,
    note: document.getElementById("f-note").value.trim(),
    type: _classifyType || "부스",
    _new: true,
  };
  contacts.push(newContact);
  // 국가 필터 업데이트
  const countries = ["전체",...new Set(contacts.map(c=>c.country))];
  const sel = document.getElementById("filter-country");
  const cur = sel.value;
  sel.innerHTML = countries.map(c=>`<option${c===cur?' selected':''}>${esc(c)}</option>`).join("");
  closeAddModal();
  renderList();
  selectContact(nextId);
}

      <div class="dist-legend">
        <span class="dist-legend-item"><span class="dist-dot" style="background:#059669"></span>높은 적합도 ${high.length}명</span>
        <span class="dist-legend-item"><span class="dist-dot" style="background:#F59E0B"></span>보통 적합도 ${mid.length}명</span>
        <span class="dist-legend-item"><span class="dist-dot" style="background:#EF4444"></span>낮은 적합도 ${low.length}명</span>
        <span class="dist-legend-item" style="margin-left:auto;cursor:pointer;color:#E8470A;font-weight:700" onclick="setRkFilter('all')">전체 보기</span>
      </div>
    </div>`;

  document.getElementById('tab-ranking').innerHTML = `
    <div class="rk-wrap">
      <div class="rk-sidebar">${sidebar}</div>
      <div class="rk-main">
        <div class="rk-top">
          <div class="rk-title">섭외 우선순위 분석 <span>${total}명</span></div>
          <div class="rk-desc">카드를 클릭하면 이메일 생성 화면으로 이동합니다</div>
        </div>
        ${summaryCards}
        ${distBar}
        <div id="rk-cards"></div>
      </div>
    </div>`;

  renderRankingCards();
}

function renderRankingCards() {
  const scored = window._rkScored || [];
  const list = rkFilter==='all' ? scored : scored.filter(c=>c._grade===rkFilter);

  function scoreColor(s) { return s>=70?'#059669':s>=40?'#F59E0B':'#EF4444'; }

  if (rkFilter==='all') {
    const high = scored.filter(c=>c._grade==='high');
    const mid  = scored.filter(c=>c._grade==='mid');
    const low  = scored.filter(c=>c._grade==='low');
    document.getElementById('rk-cards').innerHTML =
      renderSection('✅ 높은 적합도','#059669',high) +
      renderSection('⚡ 보통 적합도','#D97706',mid) +
      renderSection('❌ 낮은 적합도','#DC2626',low);
  } else {
    const labels = {high:'✅ 높은 적합도',mid:'⚡ 보통 적합도',low:'❌ 낮은 적합도'};
    const colors = {high:'#059669',mid:'#D97706',low:'#DC2626'};
    document.getElementById('rk-cards').innerHTML = renderSection(labels[rkFilter],colors[rkFilter],list);
  }
}

function renderSection(label, color, list) {
  if (!list.length) return '';
  function scoreColor(s) { return s>=70?'#059669':s>=40?'#F59E0B':'#EF4444'; }
  const cards = list.map((c,i)=>{
    const tc = TYPE_COLORS[c._sugType]||TYPE_COLORS['부스'];
    const rc = i===0?'gold':i===1?'silver':i===2?'bronze':'';
    const tags = c._reasons.map(r=>`<span class="rk-tag">${esc(r)}</span>`).join('');
    const sc = scoreColor(c._score);
    return `<div class="rk-card" onclick="goToContact(${c.id})">
      <div class="rk-rank ${rc}">${i+1}</div>
      <div>
        <div class="rk-name">${esc(FLAGS[c.country]||'🌏')} ${esc(c.name)}</div>
        <div class="rk-company">${esc(c.company)}</div>
      </div>
      <div class="rk-score-col">
        <span class="rk-score-num" style="color:${sc}">${c._score}<span style="font-size:10px;font-weight:500;color:#9CA3AF">pt</span></span>
        <div class="rk-score-bar-bg"><div class="rk-score-bar-fill" style="width:${c._score}%;background:${sc}"></div></div>
      </div>
      <div><span class="rk-type-badge" style="background:${tc.bg};color:${tc.text};border-color:${tc.border}">${tc.label}</span></div>
      <div class="rk-tags">${tags}</div>
    </div>`;
  }).join('');
  return `<div class="rk-section-label" style="color:${color}">${label}<span style="font-size:10px;font-weight:400;color:#9CA3AF;margin-left:6px">${list.length}명</span></div>${cards}`;
}

function goToContact(id) {
  switchTab('email');
  selectContact(id);
}


// ── 행사 선택 ─────────────────────────────────────────────────────
function selectEvent(id) {
  if (!SHOWS[id]) return;
  state.event = id;
  // 이미 선택된 시즌 유지 (행사 전환 시에만 첫 시즌으로 리셋)
  const validSeason = SHOWS[id].seasons.find(s => s.key === state.season);
  if (!validSeason) state.season = SHOWS[id].seasons[0].key;
  // 칩 active 업데이트
  Object.keys(SHOWS).forEach(k => {
    const btn = document.getElementById('chip-' + k);
    if (btn) btn.className = 'event-chip' + (k === id ? ' active' : '');
  });
  renderEventDetailBar();
  if (state.selected && state.purpose) renderDetail();
}

// ── 행사 상세바 렌더 (Tier 3) ──────────────────────────────────────
function renderEventDetailBar() {
  const bar = document.getElementById('event-detail-bar');
  if (!bar) return;
  const ev = SHOWS[state.event] || SHOWS.megazoo;
  const ST = ev.stats || {};

  const seasonPills = ev.seasons.map(s => {
    const active = s.key === state.season;
    return `<button class="ev-season-pill${active?' active':''}" onclick="setSeason('${s.key}')">${s.label}<br><span class="ev-season-date">${s.dates}</span></button>`;
  }).join('');

  const statItems = [
    ['총 방문객', (ST.visitors2025||'—')+'명'],
    ['참가사',   (ST.exhibitors2025||'—')+'개사'],
    ['해외 참가국',(ST.countries2025||'—')+'개국'],
    ['비즈매칭', (ST.matchMeetings||'—')+'건'],
    ['총 상담액', ST.consultationUSD||'—'],
  ].map(([l,v])=>`<div class="ev-stat-item"><span class="ev-stat-label">${l}</span><span class="ev-stat-value">${v}</span></div>`).join('');

  bar.innerHTML = `
    ${seasonPills}
    <div class="ev-divider"></div>
    <span class="ev-perf-label">2025 실적</span>
    ${statItems}
  `;
}

</script>
</body>
</html>
